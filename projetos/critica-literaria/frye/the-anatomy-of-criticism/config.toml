# Config: Frye — Anatomy of Criticism (o sistema; 27 seções).
# Stack MODULADO por CONTEÚDO (reavaliação crítica 2026-06-10 — o modelo é
# DIRETRIZ, não regra: cada seção recebe o stack que o texto realmente pede).
#   Base A·B·D. Arena onde Frye POLEMIZA contra uma tradição (campo de forças real),
#   não mecanicamente em toda intro de ensaio. Meditatio onde o conteúdo é
#   experiência vivida (4 mythoi + ápice anagógico). Reduções onde a seção é
#   conectiva/fina demais p/ filtro. Léxico só na camada-livro. 92 áudios (realoca,
#   não infla). Ver [formatos.overrides] p/ a razão de cada desvio do padrão.

[obra]
titulo = "Anatomy of Criticism: Four Essays"
autor = "Northrop Frye"
slug = "anatomy-of-criticism"
sigla = "AC"
idioma_obra = "en"
idioma_saida = "pt-BR"
modelo_dominante = "Frye's system — internal reconstruction at maximum; the four essays (modes, symbols, myths, genres) build a 'science' of criticism; the master test is whether his taxonomy captures a real structure of literature or is self-referential"

[notebooklm]
notebook_id = ""          # checkpoint: avisar antes de criar (conta pessoal)
profile = "default"
format = "deep_dive"
length = "default"        # médio

[formatos]
default_capitulo = ["portico", "reconstrucao", "filtro"]
camada_livro = ["portico_geral", "lexico_geral", "filtro_tese"]

[formatos.overrides]
# +Arena (campo de forças real — Frye polemiza contra uma tradição):
"1"  = ["portico", "reconstrucao", "arena", "filtro"]   # Polemical Intro — o MANIFESTO; todo o campo de forças do livro (parasita/arte-pela-arte/determinismos/Ruskin vs Arnold)
"9"  = ["portico", "reconstrucao", "arena", "filtro"]   # Mythical Phase — define "arquétipo"; polemiza contra o culto romântico da originalidade
"11" = ["portico", "reconstrucao", "arena", "filtro"]   # Third Essay intro — contra a falácia representacional (analogia pintura/música)
"17" = ["portico", "reconstrucao", "arena", "filtro"]   # Fourth Essay intro — teoria dos gêneros vs tradição
# Arena NO LUGAR de filtro (intro de campo; pouco a "testar" ainda — os testes vêm nas fases):
"6"  = ["portico", "reconstrucao", "arena"]             # Second Essay intro — a arena das escolas críticas (Freud/Jung/Marx/New Criticism)
# +Meditatio (experiência vivida): 4 mythoi + ápice anagógico:
"10" = ["portico", "reconstrucao", "filtro", "meditatio"]  # Anagogic Phase — ápice contemplativo/visionário (desejo infinito, o "centro imóvel")
"13" = ["portico", "reconstrucao", "filtro", "meditatio"]  # Mythos of Spring — Comedy
"14" = ["portico", "reconstrucao", "filtro", "meditatio"]  # Mythos of Summer — Romance
"15" = ["portico", "reconstrucao", "filtro", "meditatio"]  # Mythos of Autumn — Tragedy
"16" = ["portico", "reconstrucao", "filtro", "meditatio"]  # Mythos of Winter — Irony/Satire
# −filtro (seção conectiva/fina; sem tese contestável p/ teste adversarial):
"20" = ["portico", "reconstrucao"]                      # Rhythm of Decorum — Drama (998 pal.; descritiva)
# Nota: cap 2 (tabela dos 5 modos) fica em A·B·D — central, mas a posição histórica é
# leve demais p/ arena (a arena de campo está no cap 1). cap 12 (deriva os 4 mythoi)
# fica em A·B·D mas é KEYSTONE: reconstrução+filtro devem ser especialmente fortes.

[docling]
chapters_dir = "output/chapters"
fonte_md = "output/anatomy-of-criticism_fonte_nlm.md"

[paths]
unidades = "_unidades_manifest.json"
prompts = "prompts"
audios = "audios"

[lifecycle]
dell_sync = true
dell_slug = "frye-anatomy-of-criticism"

[telegram]
enabled = true
projeto_label = "Frye — Anatomy of Criticism"
